# Repeater TCP binaries are normally built locally and committed under prebuilt/
# (see docs/REPEATER_RELEASE_PROCEDURE.md). This workflow does not run on tag push.
# Run manually from Actions only if you need CI-built artifacts.

name: Build Repeater Firmwares

on:
  workflow_dispatch:
    inputs:
      repeater_version:
        description: 'Same as REPEATER_FIRMWARE_VERSION, e.g. v1.14.1.0-repeater-tcp (or legacy repeater-1.0.2)'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  build:
    runs-on: ubuntu-latest
    steps:

      - name: Clone Repo
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Firmwares
        env:
          REPEATER_FIRMWARE_VERSION: ${{ github.event.inputs.repeater_version }}
          DISABLE_DEBUG: '1'
        run: /usr/bin/env bash build.sh build-repeater-firmwares

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repeater-firmwares
          path: out
